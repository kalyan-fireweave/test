services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-notes_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-notes_password}
      POSTGRES_DB: ${POSTGRES_DB:-notes_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-notes_user} -d ${POSTGRES_DB:-notes_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-notes_user}:${POSTGRES_PASSWORD:-notes_password}@postgres:5432/${POSTGRES_DB:-notes_db}
      PORT: 3000
    ports:
      - "4376:3000"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    restart: unless-stopped
    environment:
      PORT: 4376
      HOST: 0.0.0.0
      API_ORIGIN: http://api:3000
    ports:
      - "5173:4376"
    depends_on:
      - api

volumes:
  postgres_data:
