name: Deploy on git_actions

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    environment: production

    permissions:
      contents: read
      deployments: write

    env:
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
      DEPLOY_BRANCH: main

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Log Layer 1 signal (push detected)
        run: |
          echo "[L1] push detected"
          echo "repo=${{ github.repository }}"
          echo "sha=${{ github.sha }}"
          echo "branch=${{ github.ref_name }}"
          echo "confidence=unknown"

      - name: Create GitHub deployment (Layer 2)
        id: create_deployment
        uses: actions/github-script@v8
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: "production",
              auto_merge: false,
              required_contexts: []
            });

            core.setOutput("deployment_id", deployment.data.id);

            console.log("[L2] deployment created");
            console.log(`deployment_id=${deployment.data.id}`);
            console.log(`sha=${context.sha}`);
            console.log("confidence=production-confirmed");

      - name: Deploy over SSH
        id: ssh_deploy
        continue-on-error: true
        env:
          DEPLOY_PATH: ${{ env.DEPLOY_PATH }}
          DEPLOY_BRANCH: ${{ env.DEPLOY_BRANCH }}
          POSTGRES_USER: ${{ vars.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ vars.POSTGRES_DB }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SSH_PORT: ${{ secrets.SSH_PORT || 22 }}
        run: |
          echo "[DEPLOY] starting ssh deploy"
          set -euo pipefail

          KEY_FILE="$(mktemp)"
          trap 'rm -f "$KEY_FILE"' EXIT
          printf '%s\n' "$SSH_KEY" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"

          ssh -i "$KEY_FILE" -p "$SSH_PORT" \
            -o StrictHostKeyChecking=accept-new \
            -o BatchMode=yes \
            "$SSH_USER@$SSH_HOST" \
            "DEPLOY_PATH=$(printf %q "$DEPLOY_PATH") \
             DEPLOY_BRANCH=$(printf %q "$DEPLOY_BRANCH") \
             POSTGRES_USER=$(printf %q "${POSTGRES_USER:-}") \
             POSTGRES_PASSWORD=$(printf %q "${POSTGRES_PASSWORD:-}") \
             POSTGRES_DB=$(printf %q "${POSTGRES_DB:-}") \
             bash -s" <<'REMOTE'
          set -euo pipefail

          cd "$DEPLOY_PATH"

          git fetch --all
          git checkout "$DEPLOY_BRANCH"
          git pull origin "$DEPLOY_BRANCH"

          {
            echo "POSTGRES_USER=${POSTGRES_USER:-notes_user}"
            echo "POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-notes_password}"
            echo "POSTGRES_DB=${POSTGRES_DB:-notes_db}"
          } > .env

          docker compose up -d postgres
          for i in $(seq 1 30); do
            docker compose exec -T postgres pg_isready -U "${POSTGRES_USER:-notes_user}" -d "${POSTGRES_DB:-notes_db}" && break
            sleep 2
          done
          docker compose up -d --build --remove-orphans

          sleep 15

          curl -sf "http://127.0.0.1:4376/health" | head -c 300

          echo ""
          echo "[DEPLOY] completed"
          REMOTE

      # Always mark deployment as FAILURE
      # even if deployment succeeded
      - name: Mark deployment failure
        if: ${{ always() }}
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: Number("${{ steps.create_deployment.outputs.deployment_id }}"),
              state: "failure",
              description: "Forced failure status"
            });

            console.log("[L2] deployment_status=failure");
            console.log("confidence=unknown");
            console.log("forced_status=true");
